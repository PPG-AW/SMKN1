  <style>
        * {

        html, body {
            height: 100%;

        #app {

        .header {

        .bagian-btn {

        .soal-container {
            background-color: #fff;

        .gambar-container {
            display: flex;

        canvas {
            max-width: 100%;

        .opsi-label {
            display: block;

        .opsi {
            display: flex;

        .opsi:hover {

        .opsi input[type="radio"] {

        .opsi.selected {

        .opsi.correct {

        .opsi.incorrect {

        .opsi-text {

        .feedback {

        .feedback.salah {

        .btn-jawab {
            background-color: #2c3e50;

            border: none;

            margin-top: 1rem;
        }

        .btn-jawab:hover:not(:disabled) {
            background-color: #1a252f;
        }

        .btn-jawab:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-soal-baru {
            background-color: #0066cc;

            border: none;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-soal-baru:hover {
            background-color: #0052a3;
        }

        .footer {
            padding: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: #999;
            border-top: 1px solid #e0e0e0;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .bagian-tabs {
                padding: 0.8rem;
                gap: 0.3rem;
            }

            .bagian-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }

            .content {
                padding: 1rem;
            }

            .soal-container {
                padding: 1.5rem;
            }

            .soal-judul {
                font-size: 1.1rem;
            }

            .soal-teks {
                font-size: 0.95rem;
            }
        }

        .mathjax-container {
            display: flex;

            margin: 0.5rem 0;
        }

        .frac {

        .frac span {

 <body>
  <div id="app">
   <div class="header">
    <h1>Soal Generator Trigonometri</h1>
    <div class="bagian-tabs" id="bagianTabs"></div>
   </div>
   <div class="content" id="content">
    <div class="soal-container" id="soalContainer"></div>
   </div>
   <div class="footer">
    Latihan Soal Trigonometri untuk Siswa
   </div>
  </div>
  <script>
        const BAGIAN_DATA = {
            1: {
                nama: "Identifikasi Komponen",
                deskripsi: "Menentukan sisi depan, samping, dan miring",
                kasus: 18
            },
            2: {
                nama: "Teorema Pythagoras",
                deskripsi: "Menghitung panjang sisi yang hilang",
                kasus: 3
            },
            3: {
                nama: "Perbandingan Dasar",
                deskripsi: "Nilai sin, cos, tan, sec, csc, cot",
                kasus: 6
            },
            4: {
                nama: "Perbandingan Belum Lengkap",
                deskripsi: "Cari sisi dulu, lalu hitung perbandingan",
                kasus: 12
            },
            5: {
                nama: "Sudut Istimewa",
                deskripsi: "Nilai pada 0°, 30°, 45°, 60°, 90°",
                kasus: 5
            },
            6: {
                nama: "Sudut Berelasi",
                deskripsi: "Sudut acuan di berbagai kuadran",
                kasus: 9
            },
            7: {
                nama: "Nilai di Kuadran",
                deskripsi: "Nilai trig di kuadran II, III, IV",
                kasus: 3
            },
            8: {
                nama: "Operasi Campuran",
                deskripsi: "Operasi hitung melibatkan nilai trig",
                kasus: 10
            },
            9: {
                nama: "Sudut Elevasi & Depresi",
                deskripsi: "Identifikasi sudut dalam narasi",
                kasus: 2
            },
            10: {
                nama: "Masalah Nyata",
                deskripsi: "Aplikasi trigonometri dalam kehidupan",
                kasus: 5
            },
            11: {
                nama: "Panjang Sisi dengan Sudut Istimewa",
                deskripsi: "Hitung sisi menggunakan perbandingan trigonometri",
                kasus: 7
            }
        };

        let currentBagian = 1;
        let currentKasus = 1;
        let attemptCount = 0;
        let currentSoal = null;

        // Inisialisasi tabs
        function initTabs() {
            const tabsContainer = document.getElementById('bagianTabs');
            Object.entries(BAGIAN_DATA).forEach(([num, data]) => {
                const btn = document.createElement('button');
                btn.className = 'bagian-btn';
                if (num == currentBagian) btn.classList.add('active');
                btn.textContent = `Bagian ${num}`;
                btn.onclick = () => pindahBagian(parseInt(num));
                tabsContainer.appendChild(btn);
            });
        }

        function pindahBagian(bagian) {
            currentBagian = bagian;
            currentKasus = Math.floor(Math.random() * BAGIAN_DATA[bagian].kasus) + 1;
            attemptCount = 0;
            updateTabs();
            muatSoal();
        }

        function updateTabs() {
            document.querySelectorAll('.bagian-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === currentBagian);
            });
        }

        // Generator Soal
        function generateSoal(bagian, kasus) {
            if (bagian === 1) return generateBagian1(kasus);
            if (bagian === 2) return generateBagian2(kasus);
            if (bagian === 3) return generateBagian3(kasus);
            if (bagian === 4) return generateBagian4(kasus);
            if (bagian === 5) return generateBagian5(kasus);
            if (bagian === 6) return generateBagian6(kasus);
            if (bagian === 7) return generateBagian7(kasus);
            if (bagian === 8) return generateBagian8(kasus);
            if (bagian === 9) return generateBagian9(kasus);
            if (bagian === 10) return generateBagian10(kasus);
            if (bagian === 11) return generateBagian11(kasus);
        }

        function generateBagian1(kasus) {
            let sudutAcuan, sudutSikuSiku, soalTeks, jawaban, opsi, petunjuk, pembahasan;

            // Mapping 18 kasus = 6 kombinasi × 3 jenis sisi
            // Kombinasi: A-B, C-B, B-A, C-A, B-C, A-C
            // Jenis: depan, samping, miring
            
            const mapping = {
                // === Kombinasi 1: Acuan A, Siku B ===
                1: { acuan: 'A', siku: 'B', jenis: 'depan' },
                2: { acuan: 'A', siku: 'B', jenis: 'samping' },
                3: { acuan: 'A', siku: 'B', jenis: 'miring' },
                
                // === Kombinasi 2: Acuan C, Siku B ===
                4: { acuan: 'C', siku: 'B', jenis: 'depan' },
                5: { acuan: 'C', siku: 'B', jenis: 'samping' },
                6: { acuan: 'C', siku: 'B', jenis: 'miring' },
                
                // === Kombinasi 3: Acuan B, Siku A ===
                7: { acuan: 'B', siku: 'A', jenis: 'depan' },
                8: { acuan: 'B', siku: 'A', jenis: 'samping' },
                9: { acuan: 'B', siku: 'A', jenis: 'miring' },
                
                // === Kombinasi 4: Acuan C, Siku A ===
                10: { acuan: 'C', siku: 'A', jenis: 'depan' },
                11: { acuan: 'C', siku: 'A', jenis: 'samping' },
                12: { acuan: 'C', siku: 'A', jenis: 'miring' },
                
                // === Kombinasi 5: Acuan B, Siku C ===
                13: { acuan: 'B', siku: 'C', jenis: 'depan' },
                14: { acuan: 'B', siku: 'C', jenis: 'samping' },
                15: { acuan: 'B', siku: 'C', jenis: 'miring' },
                
                // === Kombinasi 6: Acuan A, Siku C ===
                16: { acuan: 'A', siku: 'C', jenis: 'depan' },
                17: { acuan: 'A', siku: 'C', jenis: 'samping' },
                18: { acuan: 'A', siku: 'C', jenis: 'miring' }
            };

            const kasusInfo = mapping[kasus];
            sudutAcuan = kasusInfo.acuan;
            sudutSikuSiku = kasusInfo.siku;
            const jenis = kasusInfo.jenis;

            // Fungsi helper untuk menentukan sisi
            const getSisi = (acuan, siku, jenis) => {
                const allSides = ['AB', 'BC', 'AC'];
                
                // Tentukan sisi miring (berhadapan dengan siku-siku)
                let miringSisi;
                if (siku === 'A') miringSisi = 'BC';
                else if (siku === 'B') miringSisi = 'AC';
                else miringSisi = 'AB';
                
                // Tentukan sisi yang tidak menyentuh acuan (depan)
                const depan = allSides.find(s => !s.includes(acuan));
                
                // Tentukan sisi yang menyentuh acuan tapi bukan miring (samping)
                const touchingAcuan = allSides.filter(s => s.includes(acuan));
                const samping = touchingAcuan.find(s => s !== miringSisi);
                
                if (jenis === 'depan') return { jawaban: depan, opsi: [depan, samping, miringSisi] };
                if (jenis === 'samping') return { jawaban: samping, opsi: [samping, depan, miringSisi] };
                if (jenis === 'miring') return { jawaban: miringSisi, opsi: [miringSisi, depan, samping] };
            };

            const sisiInfo = getSisi(sudutAcuan, sudutSikuSiku, jenis);
            jawaban = sisiInfo.jawaban;
            opsi = sisiInfo.opsi;

            // Tentukan soal teks berdasarkan jenis
            if (jenis === 'depan') {
                soalTeks = `Jika sudut acuan berada di titik <strong>${sudutAcuan}</strong> dan sudut siku-siku di titik <strong>${sudutSikuSiku}</strong>, maka sisi depan adalah ...`;
                petunjuk = `
                    <strong>📍 Langkah-Langkah Menyelesaikan:</strong><br><br>
                    <strong style="color: #0066cc;">Langkah 1: Identifikasi Sudut Acuan dan Sudut Siku-Siku</strong>
                    <ul style="margin-left: 1rem; background-color: #e3f2fd; padding: 0.8rem; border-radius: 4px;">
                    <li>🔴 Arc merah di titik <strong>${sudutAcuan}</strong> = Sudut acuan (α)</li>
                    <li>📦 Kotak kecil di titik <strong>${sudutSikuSiku}</strong> = Sudut siku-siku (90°)</li>
                    </ul>
                    <br>
                    <strong style="color: #0066cc;">Langkah 2: Pahami Definisi Sisi Depan</strong>
                    <ul style="margin-left: 1rem; background-color: #fff3e0; padding: 0.8rem; border-radius: 4px;">
                    <li><strong>Sisi Depan (Opposite):</strong> Sisi yang TIDAK menyentuh sudut acuan</li>
                    <li>Lihat dari sudut ${sudutAcuan}, sisi mana yang berada di seberangnya (jauh dari ${sudutAcuan})?</li>
                    </ul>
                    <br>
                    <strong style="color: #0066cc;">Langkah 3: Identifikasi Semua Sisi pada Gambar</strong>
                    <ul style="margin-left: 1rem; background-color: #f3e5f5; padding: 0.8rem; border-radius: 4px;">
                    <li>Ada 3 sisi: AB, BC, dan AC</li>
                    <li>Dari titik ${sudutAcuan}, ada berapa sisi yang menyentuh ${sudutAcuan}? Yang mana?</li>
                    <li>Sisi yang tersisa adalah sisi depan!</li>
                    </ul>
                `;
                pembahasan = `
                    <strong>✅ PEMBAHASAN LENGKAP</strong><br><br>
                    <strong style="font-size: 1.05rem; color: #2c3e50;">📌 Informasi Soal:</strong>
                    <div style="background-color: #ecf0f1; padding: 1rem; border-left: 4px solid #3498db; margin: 0.5rem 0;">
                    <li>✓ Sudut acuan (α): Titik <strong>${sudutAcuan}</strong></li>
                    <li>✓ Sudut siku-siku (90°): Titik <strong>${sudutSikuSiku}</strong></li>
                    </div>
                    <br>
                    <strong style="font-size: 1.05rem; color: #2c3e50;">🔍 Cara Menemukan Jawaban:</strong><br><br>
                    
                    <strong style="color: #d32f2f;">SISI DEPAN (Opposite) = ${jawaban}</strong>
                    <div style="background-color: #ffebee; padding: 1rem; border-radius: 6px; margin-bottom: 0.8rem;">
                    <strong>Definisi:</strong> Sisi depan adalah sisi yang TIDAK menyentuh sudut acuan<br><br>
                    <strong>Penjelasan:</strong>
                    <ul style="margin-left: 1.5rem; margin-top: 0.5rem;">
                    <li>Sudut acuan ada di titik ${sudutAcuan}</li>
                    <li>Identifikasi sisi yang menyentuh ${sudutAcuan}</li>
                    <li>Identifikasi sisi yang TIDAK menyentuh ${sudutAcuan}: <strong>${jawaban}</strong></li>
                    <li>Sisi ${jawaban} berada di seberang/depan sudut acuan ${sudutAcuan}</li>
                    <li>Maka, <strong>Sisi Depan = ${jawaban}</strong></li>
                    </ul>
                    </div>
                    
                    <strong style="font-size: 1.05rem; color: #2c3e50;">📋 JAWABAN AKHIR:</strong><br>
                    <div style="background-color: #d4edda; padding: 1.2rem; border-radius: 6px; border-left: 5px solid #28a745;">
                    <strong>Sisi Depan = ${jawaban}</strong>
                    </div>
                `;
            } else if (jenis === 'samping') {
                soalTeks = `Jika sudut acuan berada di titik <strong>${sudutAcuan}</strong> dan sudut siku-siku di titik <strong>${sudutSikuSiku}</strong>, maka sisi samping adalah ...`;
                petunjuk = `
                    <strong>📍 Langkah-Langkah Menyelesaikan:</strong><br><br>
                    <strong style="color: #0066cc;">Langkah 1: Identifikasi Sudut Acuan dan Sudut Siku-Siku</strong>
                    <ul style="margin-left: 1rem; background-color: #e3f2fd; padding: 0.8rem; border-radius: 4px;">
                    <li>🔴 Arc merah di titik <strong>${sudutAcuan}</strong> = Sudut acuan (α)</li>
                    <li>📦 Kotak kecil di titik <strong>${sudutSikuSiku}</strong> = Sudut siku-siku (90°)</li>
                    </ul>
                    <br>
                    <strong style="color: #0066cc;">Langkah 2: Pahami Definisi Sisi Samping</strong>
                    <ul style="margin-left: 1rem; background-color: #fff3e0; padding: 0.8rem; border-radius: 4px;">
                    <li><strong>Sisi Samping (Adjacent):</strong> Sisi yang MENYENTUH sudut acuan, tapi BUKAN sisi miring</li>
                    <li>Dari sudut ${sudutAcuan}, ada sisi mana yang menyentuh ${sudutAcuan}?</li>
                    </ul>
                    <br>
                    <strong style="color: #0066cc;">Langkah 3: Identifikasi Sisi Miring Dulu</strong>
                    <ul style="margin-left: 1rem; background-color: #f3e5f5; padding: 0.8rem; border-radius: 4px;">
                    <li><strong>Sisi Miring:</strong> Sisi yang berhadapan dengan sudut siku-siku di ${sudutSikuSiku}</li>
                    <li>Dari sisi yang menyentuh ${sudutAcuan}, hilangkan sisi miring</li>
                    <li>Sisi samping adalah sisi yang tersisa!</li>
                    </ul>
                `;
                pembahasan = `
                    <strong>✅ PEMBAHASAN LENGKAP</strong><br><br>
                    <strong style="font-size: 1.05rem; color: #2c3e50;">📌 Informasi Soal:</strong>
                    <div style="background-color: #ecf0f1; padding: 1rem; border-left: 4px solid #3498db; margin: 0.5rem 0;">
                    <li>✓ Sudut acuan (α): Titik <strong>${sudutAcuan}</strong></li>
                    <li>✓ Sudut siku-siku (90°): Titik <strong>${sudutSikuSiku}</strong></li>
                    </div>
                    <br>
                    <strong style="font-size: 1.05rem; color: #2c3e50;">🔍 Cara Menemukan Jawaban:</strong><br><br>
                    
                    <strong style="color: #d32f2f;">SISI SAMPING (Adjacent) = ${jawaban}</strong>
                    <div style="background-color: #f3e5f5; padding: 1rem; border-radius: 6px; margin-bottom: 0.8rem;">
                    <strong>Definisi:</strong> Sisi yang menyentuh sudut acuan, tapi BUKAN sisi miring<br><br>
                    <strong>Penjelasan:</strong>
                    <ul style="margin-left: 1.5rem; margin-top: 0.5rem;">
                    <li>Sudut acuan berada di titik ${sudutAcuan}</li>
                    <li>Dari titik ${sudutAcuan}, identifikasi sisi yang menyentuh ${sudutAcuan}</li>
                    <li>Tentukan mana yang sisi miring dari sudut siku-siku di ${sudutSikuSiku}</li>
                    <li>Sisi samping adalah sisi lain yang menyentuh ${sudutAcuan} = <strong>${jawaban}</strong></li>
                    </ul>
                    </div>
                    
                    <strong style="font-size: 1.05rem; color: #2c3e50;">📋 JAWABAN AKHIR:</strong><br>
                    <div style="background-color: #d4edda; padding: 1.2rem; border-radius: 6px; border-left: 5px solid #28a745;">
                    <strong>Sisi Samping = ${jawaban}</strong>
                    </div>
                `;
            } else { // miring
                soalTeks = `Jika sudut acuan berada di titik <strong>${sudutAcuan}</strong> dan sudut siku-siku di titik <strong>${sudutSikuSiku}</strong>, maka sisi miring adalah ...`;
                petunjuk = `
                    <strong>📍 Langkah-Langkah Menyelesaikan:</strong><br><br>
                    <strong style="color: #0066cc;">Langkah 1: Identifikasi Sudut Siku-Siku</strong>
                    <ul style="margin-left: 1rem; background-color: #e3f2fd; padding: 0.8rem; border-radius: 4px;">
                    <li>📦 Kotak kecil di titik <strong>${sudutSikuSiku}</strong> = Sudut siku-siku (90°)</li>
                    </ul>
                    <br>

        function renderSoal() {
            const container = document.getElementById('soalContainer');
            container.innerHTML = '';

            // Judul dan deskripsi bagian
            const headerDiv = document.createElement('div');
            headerDiv.className = 'soal-judul';
            headerDiv.innerHTML = `${currentSoal.judul} - Kasus ${currentKasus}`;
            container.appendChild(headerDiv);

            // Teks soal
            const tekstDiv = document.createElement('div');
            tekstDiv.className = 'soal-teks';
            tekstDiv.innerHTML = currentSoal.teks;
            container.appendChild(tekstDiv);

            // Gambar jika ada
            if (currentSoal.gambar && currentSoal.gambar.tipe === 'segitiga') {
                const gambarDiv = document.createElement('div');
                gambarDiv.className = 'gambar-container';
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 350;
                gambarDiv.appendChild(canvas);
                container.appendChild(gambarDiv);

                drawSegitiga(canvas, currentSoal.gambar.sudutAcuan, currentSoal.gambar.sudutSikuSiku, currentSoal.gambar.a, currentSoal.gambar.b, currentSoal.gambar.c, currentSoal.gambar.showLabels);
            } else if (currentSoal.gambar && currentSoal.gambar.tipe === 'kuadran') {
                const gambarDiv = document.createElement('div');
                gambarDiv.className = 'gambar-container';
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 400;
                gambarDiv.appendChild(canvas);
                container.appendChild(gambarDiv);

                if (currentSoal.gambar.tanda) {
                    drawKuadranTanda(canvas, currentSoal.gambar.kuadran);
                } else {
                    drawKuadran(canvas, currentSoal.gambar.sudut, currentSoal.gambar.kuadran);
                }
            }

            // Opsi jawaban

            const opsiLabel = document.createElement('div');

            opsiDiv.appendChild(opsiLabel);

            currentSoal.opsi.forEach((opt, idx) => {

            container.appendChild(opsiDiv);

            // Tombol jawab dan soal baru
            const btnDiv = document.createElement('div');

            const btnJawab = document.createElement('button');

        function drawSegitiga(canvas, sudutAcuan, sudutSikuSiku, a, b, c, showLabels) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Tentukan posisi segitiga berdasarkan sudut siku-siku
            let A, B, C;
            const baseX = 100;
            const baseY = 280;
            
            if (sudutSikuSiku === 'A') {
                // Siku-siku di A (bottom-left)
                A = { x: baseX, y: baseY };
                B = { x: baseX + 180, y: baseY };      // Horizontal ke kanan
                C = { x: baseX, y: baseY - 150 };      // Vertical ke atas
            } else if (sudutSikuSiku === 'B') {
                // Siku-siku di B (bottom-right)
                B = { x: baseX + 180, y: baseY };
                A = { x: baseX, y: baseY };            // Horizontal ke kiri
                C = { x: baseX + 180, y: baseY - 150 }; // Vertical ke atas
            } else if (sudutSikuSiku === 'C') {
                // Siku-siku di C (top-right)
                C = { x: baseX + 180, y: baseY - 150 };
                B = { x: baseX + 180, y: baseY };      // Vertical ke bawah
                A = { x: baseX, y: baseY - 150 };      // Horizontal ke kiri
            }

            // Gambar segitiga
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            ctx.lineTo(B.x, B.y);
            ctx.lineTo(C.x, C.y);
            ctx.closePath();
            ctx.stroke();

            // Helper untuk menggambar kotak siku-siku
            const drawRightAngleSquare = (vertex, p1, p2) => {
                const size = 12;
                const v1 = { x: p1.x - vertex.x, y: p1.y - vertex.y };
                const v2 = { x: p2.x - vertex.x, y: p2.y - vertex.y };
                const len1 = Math.sqrt(v1.x * v1.x + v1.y * v1.y);
                const len2 = Math.sqrt(v2.x * v2.x + v2.y * v2.y);
                
                const u1 = { x: v1.x / len1, y: v1.y / len1 };
                const u2 = { x: v2.x / len2, y: v2.y / len2 };
                
                const p1_box = { x: vertex.x + u1.x * size, y: vertex.y + u1.y * size };
                const p2_box = { x: vertex.x + u2.x * size, y: vertex.y + u2.y * size };
                const corner = { x: p1_box.x + u2.x * size, y: p1_box.y + u2.y * size };
                
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(p1_box.x, p1_box.y);
                ctx.lineTo(corner.x, corner.y);
                ctx.lineTo(p2_box.x, p2_box.y);
                ctx.stroke();
            };

            // Gambar kotak siku-siku di titik yang tepat
            if (sudutSikuSiku === 'A') {
                drawRightAngleSquare(A, B, C);
            } else if (sudutSikuSiku === 'B') {
                drawRightAngleSquare(B, A, C);
            } else if (sudutSikuSiku === 'C') {
                drawRightAngleSquare(C, A, B);
            }

            // Titik sudut
            ctx.fillStyle = '#333';
            [A, B, C].forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                ctx.fill();
            });

            // Label titik A, B, C dengan posisi yang fleksibel
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Tentukan offset label berdasarkan posisi titik
            const labelOffset = (point) => {
                let offsetX = 0, offsetY = 0;
                
                if (point.x < 150) offsetX = -25; // Titik di sebelah kiri
                else if (point.x > 250) offsetX = 25; // Titik di sebelah kanan
                
                if (point.y > 250) offsetY = 25; // Titik di bawah
                else if (point.y < 150) offsetY = -25; // Titik di atas
                
                return { x: offsetX, y: offsetY };
            };
            
            let offsetA = labelOffset(A);
            let offsetB = labelOffset(B);
            let offsetC = labelOffset(C);
            
            ctx.fillText('A', A.x + offsetA.x, A.y + offsetA.y);
            ctx.fillText('B', B.x + offsetB.x, B.y + offsetB.y);
            ctx.fillText('C', C.x + offsetC.x, C.y + offsetC.y);

            // Label sisi dan panjang
            if (showLabels && a && b && c) {
                ctx.font = 'bold 13px Arial';
                ctx.fillStyle = '#d32f2f';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Tentukan miring berdasarkan sudut siku-siku
                let sideValues = { AB: null, BC: null, AC: null };
                
                // Sisi yang berhadapan dengan siku-siku adalah sisi miring
                if (sudutSikuSiku === 'A') {
                    // BC adalah miring (berhadapan dengan A)
                    // Tentukan depan/samping berdasarkan sudutAcuan
                    if (sudutAcuan === 'B') {
                        sideValues.AC = a;  // depan (tidak menyentuh B)
                        sideValues.AB = b;  // samping (menyentuh B)
                        sideValues.BC = c;  // miring
                    } else if (sudutAcuan === 'C') {
                        sideValues.AB = a;  // depan (tidak menyentuh C)
                        sideValues.AC = b;  // samping (menyentuh C)
                        sideValues.BC = c;  // miring
                    }
                } else if (sudutSikuSiku === 'B') {
                    // AC adalah miring (berhadapan dengan B)
                    if (sudutAcuan === 'A') {
                        sideValues.BC = a;  // depan (tidak menyentuh A)
                        sideValues.AB = b;  // samping (menyentuh A)
                        sideValues.AC = c;  // miring
                    } else if (sudutAcuan === 'C') {
                        sideValues.AB = a;  // depan (tidak menyentuh C)
                        sideValues.BC = b;  // samping (menyentuh C)
                        sideValues.AC = c;  // miring
                    }
                } else if (sudutSikuSiku === 'C') {
                    // AB adalah miring (berhadapan dengan C)
                    if (sudutAcuan === 'A') {
                        sideValues.BC = a;  // depan (tidak menyentuh A)
                        sideValues.AC = b;  // samping (menyentuh A)
                        sideValues.AB = c;  // miring
                    } else if (sudutAcuan === 'B') {
                        sideValues.AC = a;  // depan (tidak menyentuh B)
                        sideValues.BC = b;  // samping (menyentuh B)
                        sideValues.AB = c;  // miring
                    }
                }
                
                // Gambar label sisi dengan posisi yang tepat
                if (sideValues.AB) {
                    const midX = (A.x + B.x) / 2;
                    const midY = (A.y + B.y) / 2;
                    ctx.fillText(`${sideValues.AB} cm`, midX, midY + 25);
                }
                if (sideValues.BC) {
                    const midX = (B.x + C.x) / 2;
                    const midY = (B.y + C.y) / 2;
                    ctx.fillText(`${sideValues.BC} cm`, midX + 30, midY);
                }
                if (sideValues.AC) {
                    const midX = (A.x + C.x) / 2;
                    const midY = (A.y + C.y) / 2;
                    ctx.fillText(`${sideValues.AC} cm`, midX - 30, midY);
                }
            }

            // Fungsi menggambar arc sudut
            const drawAngleArc = (vertex, p1, p2, label) => {
                const angle1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
                const angle2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
                
                let startAngle = angle1;
                let endAngle = angle2;
                let angleDiff = endAngle - startAngle;
                
                if (angleDiff > Math.PI) endAngle -= 2 * Math.PI;
                if (angleDiff < -Math.PI) endAngle += 2 * Math.PI;
                
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 2.5;
                ctx.fillStyle = 'rgba(255, 107, 107, 0.15)';
                ctx.beginPath();
                ctx.arc(vertex.x, vertex.y, 35, startAngle, endAngle, endAngle < startAngle);
                ctx.lineTo(vertex.x, vertex.y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                const midAngle = (startAngle + endAngle) / 2;
                const labelX = vertex.x + 50 * Math.cos(midAngle);
                const labelY = vertex.y + 50 * Math.sin(midAngle);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(label, labelX, labelY);
            };
            
            // Gambar arc untuk sudut acuan α
            if (sudutAcuan === 'A') {
                drawAngleArc(A, B, C, 'α');
            } else if (sudutAcuan === 'B') {
                drawAngleArc(B, A, C, 'α');
            } else if (sudutAcuan === 'C') {
                drawAngleArc(C, A, B, 'α');
            }
        }

        function updateOpsiUI() {
            document.querySelectorAll('.opsi').forEach(btn => {
                const radio = btn.querySelector('input[type="radio"]');
                btn.classList.toggle('selected', radio.checked);
                btn.classList.remove('correct', 'incorrect');
            });
        }

        function cekJawaban() {
            const selected = document.querySelector('input[name="jawaban"]:checked');
            if (!selected) {
                alert('Pilih jawaban terlebih dahulu');
                return;
            }

            attemptCount++;
            const isCorrect = selected.value === currentSoal.jawaban;

            if (isCorrect) {
                // Benar
                const selectedBtn = selected.closest('.opsi');
                selectedBtn.classList.add('correct');
                selectedBtn.classList.remove('selected');

                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback benar show';
                feedback.innerHTML = `<strong>Jawaban Benar</strong><br><br><strong>Pembahasan:</strong><br>${currentSoal.pembahasan}`;

                document.getElementById('btnJawab').style.display = 'none';

                const btnSoalBaru = document.querySelector('.btn-soal-baru');
                if (btnSoalBaru) {
                    btnSoalBaru.style.display = 'none';
                }

                const btnNext = document.createElement('button');
                btnNext.className = 'btn-soal-baru';
                btnNext.textContent = 'Soal Berikutnya';
                btnNext.onclick = () => {
                    currentKasus = Math.floor(Math.random() * BAGIAN_DATA[currentBagian].kasus) + 1;
                    attemptCount = 0;
                    muatSoal();
                };
                document.getElementById('soalContainer').appendChild(btnNext);
            } else {
                // Salah
                const selectedBtn = selected.closest('.opsi');
                selectedBtn.classList.add('incorrect');
                selectedBtn.classList.remove('selected');

                const feedback = document.getElementById('feedback');

                if (attemptCount === 1) {
                    // Kesalahan pertama
                    feedback.className = 'feedback petunjuk show';
                    feedback.innerHTML = `<strong>Jawaban Salah</strong><br><br><strong>Petunjuk:</strong><br>${currentSoal.petunjuk}<br><br>Coba lagi!`;
                    selected.checked = false;
                    selectedBtn.classList.remove('incorrect', 'selected');
                } else {
                    // Kesalahan kedua
                    feedback.className = 'feedback jawaban show';
                    feedback.innerHTML = `<strong>Jawaban Salah</strong><br><br><strong>Jawaban yang tepat: ${currentSoal.jawaban}</strong><br><br><strong>Pembahasan:</strong><br>${currentSoal.pembahasan}`;

                    document.getElementById('btnJawab').style.display = 'none';
                    
                    const btnSoalBaru = document.querySelector('.btn-soal-baru');
                    if (btnSoalBaru) {
                        btnSoalBaru.style.display = 'none';
                    }
                    
                    document.querySelectorAll('.opsi input').forEach(opt => opt.disabled = true);

                    const btnNext = document.createElement('button');
                    btnNext.className = 'btn-soal-baru';
                    btnNext.textContent = 'Soal Berikutnya';
                    btnNext.onclick = () => {
                        currentKasus = Math.floor(Math.random() * BAGIAN_DATA[currentBagian].kasus) + 1;
                        attemptCount = 0;
                        muatSoal();
                    };
                    document.getElementById('soalContainer').appendChild(btnNext);
                }
            }
        }

        function drawKuadran(canvas, sudut, kuadran) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 100;

            // Gambar sumbu
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(50, centerY);
            ctx.lineTo(canvas.width - 50, centerY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, 50);
            ctx.lineTo(centerX, canvas.height - 50);
            ctx.stroke();

            // Label sumbu
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('+x', canvas.width - 40, centerY - 15);
            ctx.fillText('+y', centerX + 20, 40);
            ctx.fillText('-x', 40, centerY - 15);
            ctx.fillText('-y', centerX + 20, canvas.height - 20);

            // Gambar lingkaran satuan
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.stroke();

            // Konversi sudut ke radian dan gambar garis dari sudut
            const angleRad = (sudut * Math.PI) / 180;
            const endX = centerX + radius * Math.cos(angleRad);
            const endY = centerY - radius * Math.sin(angleRad);

            // Gambar garis sudut
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Titik di garis
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(endX, endY, 5, 0, 2 * Math.PI);
            ctx.fill();

            // Gambar arc untuk sudut utama (dari sumbu +x ke garis sudut) - selalu counterclockwise
            const arcRadius = 35;
            ctx.strokeStyle = '#0066cc';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            // Arc dari 0 (sumbu +x) ke angleRad, counterclockwise dengan negative angle
            ctx.arc(centerX, centerY, arcRadius, 0, -1 * angleRad, true);
            ctx.stroke();

            // Label sudut utama - ditempatkan di tengah arc
            const labelAngle = -angleRad / 2;
            const labelX = centerX + 50 * Math.cos(labelAngle);
            const labelY = centerY - 50 * Math.sin(labelAngle);
            ctx.fillStyle = '#0066cc';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${sudut}°`, labelX, labelY);
        }

        function drawKuadranTanda(canvas, kuadran) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Gambar sumbu tebal
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(40, centerY);
            ctx.lineTo(canvas.width - 40, centerY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, 40);
            ctx.lineTo(centerX, canvas.height - 40);
            ctx.stroke();

            // Label sumbu
            ctx.fillStyle = '#333';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('+x', canvas.width - 35, centerY - 20);
            ctx.fillText('+y', centerX + 25, 40);
            ctx.fillText('-x', 35, centerY - 20);
            ctx.fillText('-y', centerX + 25, canvas.height - 15);

            // Warna dan isi kuadran
            const quadrants = {
                'I': { x: 1, y: 1, tanda: '+', warna: 'rgba(0, 255, 0, 0.1)' },
                'II': { x: -1, y: 1, tanda: '+', warna: 'rgba(255, 0, 0, 0.1)' },
                'III': { x: -1, y: -1, tanda: '+', warna: 'rgba(0, 0, 255, 0.1)' },
                'IV': { x: 1, y: -1, tanda: '+', warna: 'rgba(255, 255, 0, 0.1)' }
            };

            // Highlight kuadran yang dipilih dan label tanda
            Object.keys(quadrants).forEach(q => {
                const qData = quadrants[q];
                const x1 = centerX + (qData.x > 0 ? 0 : -(canvas.width / 2 - 40));
                const y1 = centerY + (qData.y > 0 ? 0 : -(canvas.height / 2 - 40));
                const x2 = qData.x > 0 ? canvas.width - 40 : centerX;
                const y2 = qData.y > 0 ? canvas.height - 40 : centerY;

                ctx.fillStyle = q === kuadran ? qData.warna : 'rgba(200,200,200,0.05)';
                ctx.fillRect(Math.min(x1, x2), Math.min(y1, y2), Math.abs(x2 - x1), Math.abs(y2 - y1));

                // Label tanda di setiap kuadran
                const labelX = centerX + (qData.x > 0 ? 60 : -60);
                const labelY = centerY + (qData.y > 0 ? -50 : 50);
                ctx.fillStyle = q === kuadran ? '#ff6b6b' : '#999';
                ctx.font = q === kuadran ? 'bold 20px Arial' : 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Kuadran ${q}`, labelX, labelY - 20);

                // Tanda sin, cos, tan
                ctx.font = q === kuadran ? 'bold 13px Arial' : '12px Arial';
                if (q === 'I') ctx.fillText('sin: +  cos: +  tan: +', labelX, labelY + 20);
                else if (q === 'II') ctx.fillText('sin: +  cos: -  tan: -', labelX, labelY + 20);
                else if (q === 'III') ctx.fillText('sin: -  cos: -  tan: +', labelX, labelY + 20);
                else if (q === 'IV') ctx.fillText('sin: -  cos: +  tan: -', labelX, labelY + 20);
            });
        }

        function shuffleArray(arr) {
            const newArr = [...arr];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        initTabs();
        muatSoal();
        lucide.createIcons();
