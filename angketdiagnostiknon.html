<html lang="id">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angket Pembelajaran Siswa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    .app-wrapper { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .header { background: #000; color: #fff; padding: 20px; text-align: center; }
    .header h1 { font-size: 24px; margin-bottom: 5px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .container { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
    .section { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
    .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #999; border-radius: 3px; font-size: 14px; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #000; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    .question-group { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 3px; padding: 15px; margin-bottom: 15px; }
    .question-number { font-weight: bold; color: #000; margin-bottom: 8px; }
    .question-text { font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
    .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
    .radio-option { display: flex; align-items: center; gap: 6px; }
    .radio-option input { cursor: pointer; accent-color: #000; }
    .radio-option label { cursor: pointer; margin: 0; font-size: 13px; }
    .button-group { display: flex; gap: 10px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
    button { padding: 12px 30px; font-size: 14px; font-weight: bold; border: none; border-radius: 3px; cursor: pointer; transition: 0.3s; }
    .btn-save { background: #000; color: #fff; flex: 1; min-width: 150px; }
    .btn-save:hover { background: #333; }
    .btn-reset { background: #e0e0e0; color: #333; flex: 1; min-width: 150px; }
    .btn-reset:hover { background: #ccc; }
    .btn-search { background: #333; color: #fff; flex: 1; min-width: 150px; }
    .btn-search:hover { background: #555; }
    .notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 3px; font-size: 14px; font-weight: 500; max-width: 300px; z-index: 1000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .notification.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .notification.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .notification.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .loading { display: none; text-align: center; padding: 20px; }
    .loading.show { display: block; }
    .spinner { border: 3px solid #e0e0e0; border-top: 3px solid #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @media (max-width: 600px) { .header h1 { font-size: 20px; } .button-group { flex-direction: column; } button { width: 100%; } }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>

 </head>
 <body>
  <div class="app-wrapper">
   <div class="header">
    <h1>Angket Pembelajaran Siswa</h1>
    <p>Isilah angket ini dengan jujur dan teliti</p>
   </div>
   <div class="container"><!-- Form Section -->
    <form id="angketForm">
     <div class="section">
      <div class="section-title">
       Data Diri
      </div>
      <div class="form-group">
       <label for="noAbsen">No. Absen *</label><input type="text" id="noAbsen" name="noAbsen" required>
      </div>
      <div class="form-group">
       <label for="namaSiswa">Nama Lengkap *</label><input type="text" id="namaSiswa" name="namaSiswa" required>
      </div>
      <div class="form-group">
       <label for="kelas">Kelas *</label><input type="text" id="kelas" name="kelas" placeholder="Contoh: XI A" required>
      </div>
     </div>
     <div class="section" id="questionsSection">
      <div class="section-title">
       Pertanyaan Angket
      </div>
      <div id="questionsContainer"></div>
     </div>
     <div class="button-group"><button type="button" class="btn-reset" onclick="resetForm()">Reset</button> <button type="submit" class="btn-save">Simpan</button>
     </div>
    </form>
    <div class="loading" id="loadingIndicator">
     <div class="spinner"></div>
     <p>Memproses...</p>
    </div>
   </div>
  </div>
  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby_AsC41i9hBfCt2MJzIF40rBsXU0V3jJh_VtVIjGNThGZogF2ow8Bz2ACScVOs9eqvHA/exec';

    const QUESTIONS = [
      { no: 1, text: "Saya menolak ketika diajak teman untuk bermain pada jam belajar" },
      { no: 2, text: "Apabila ada materi pelajaran yang kurang saya mengerti, maka saya akan berusaha belajar lebih giat sehingga saya menjadi mengerti." },
      { no: 3, text: "Saya menerima akibat, baik positif maupun negatif atas apa yang saya lakukan dalam kegiatan belajar" },
      { no: 4, text: "Siswa mampu mengerjakan tugas yang diberikan oleh guru dengan tepat waktu" },
      { no: 5, text: "Saya selalu menunda dalam mengerjakan tugas sekolah yang diberikan oleh guru (*)" },
      { no: 6, text: "Saya selalu mengerjakan tugas dengan cara yang baru, untuk menambah variansi cara penyelesaiannya" },
      { no: 7, text: "Saya tidak suka mencoba hal yang baru dalam belajar (*)" },
      { no: 8, text: "Saya akan tetap mengerjakan tugas dari guru walaupun ada ajakan dari teman untuk bermain" },
      { no: 9, text: "Saya selalu percaya bahwa saya bisa mengerjakan tugas yang diberikan oleh guru dengan kemampuan saya sendiri" },
      { no: 10, text: "Saya selalu mengikuti saran teman dalam mengerjakan tugas tanpa mencoba hal yang baru (*)" },
      { no: 11, text: "Saya selalu cepat menerima ajakan teman untuk bermain saat pembelajaran berlangsung (*)" },
      { no: 12, text: "Saya mengambil keputusan untuk rutin belajar setiap hari atas kehendak saya sendiri" },
      { no: 13, text: "Saya merasa kurang yakin dalam mengerjakan tugas kalau tidak bertanya kepada teman (*)" },
      { no: 14, text: "Saya selalu meminta saran dari teman dalam menentukan keputusan yang akan saya ambil (*)" },
      { no: 15, text: "Saya mengerjakan tugas dengan cara yang berbeda dari yang diajarkan guru" },
      { no: 16, text: "Saya tidak akan mencari jalan keluar tentang masalah yang saya hadapi (*)" },
      { no: 17, text: "Saya tidak dapat mengerjakan semua tugas yang diberikan oleh guru dengan baik (*)" },
      { no: 18, text: "Saat tidak mau memakai cara baru dalam mengerjakan soal, karena takut gagal (*)" },
      { no: 19, text: "Saya dapat mengerjakan semua tugas yang diberikan oleh guru dengan baik" },
      { no: 20, text: "Saya selalu menandai materi dengan memberikan tinda berwarna agar materi yang saya pelajari mudah diingat" },
      { no: 21, text: "Saya selalu tergesa-gesa dalam menyelesaikan masalah (*)" },
      { no: 22, text: "Ketika diadakan ulangan, saya lebih percaya pada hasil pekerjaan saya sendiri" },
      { no: 23, text: "Saat ulangan, saya mengganti jawaban setelah mendengar jawaban yang berbeda dari teman (*)" },
      { no: 24, text: "Saya selalu berfikir matang matang dalam mengerjakan sesuatu" },
      { no: 25, text: "Saya ragu untuk mengerjakan sesuatu yang belum pernah saya lakukan sebelumnya (*)" },
      { no: 26, text: "Saya selalu berusaha menyelesaikan masalah belajar tanpa meminta bantuan orang tua." },
      { no: 27, text: "Saya akan mengeluh jika banyak tugas yang harus dikerjakan dan saya tidak bisa mengerjakannya. (*)" },
      { no: 28, text: "Saya lebih senang mengikuti saran dari teman dari pada menentukan kehendak saya sendiri (*)" },
      { no: 29, text: "Saya selalu menerima ajakan teman untuk bermain saat pembelajaran berlangsung (*)" },
      { no: 30, text: "Saya selalu mengikuti kehendak sendiri dalam mengambil keputusan" },
      { no: 31, text: "Saya segera mencari strategi belajar mandiri untuk mengejar ketertinggalan materi saat pengerjaan UP" },
      { no: 32, text: "Saya merasa cemas dan panik secara berlebihan ketika melihat target UP yang belum tercapai (*)" },
      { no: 33, text: "Saya tetap merasa tenang dan optimis meskipun menghadapi materi UP yang sulit" },
      { no: 34, text: "Saya merasa sangat kesulitan dan terbebani saat melakukan progres pengerjaan UP (*)" },
      { no: 35, text: "Saya cenderung mengabaikan tugas UP jika merasa sudah terlalu jauh tertinggal dari jadwal (*)" },
      { no: 36, text: "Saya merasa putus asa saat menghadapi hambatan teknis atau materi dalam UP (*)" },
      { no: 37, text: "Saya menambah jam belajar secara mandiri agar ketertinggalan dalam UP bisa teratasi" },
      { no: 38, text: "Saya merasa kebingungan untuk memulai pengerjaan kembali setelah sempat tertinggal dalam UP (*)" },
      { no: 39, text: "Saya tetap bersemangat menyelesaikan UP tepat waktu meskipun prosesnya melelahkan" },
      { no: 40, text: "Saya merasa kesulitan mengatur skala prioritas sehingga tugas UP saya banyak yang tertunda (*)" }
    ];

    const OPTIONS = [
      { label: 'SS', value: 5 },
      { label: 'S', value: 4 },
      { label: 'KS', value: 3 },
      { label: 'TS', value: 2 },
      { label: 'STS', value: 1 }
    ];

    function initializeForm() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      QUESTIONS.forEach(q => {
        const div = document.createElement('div');
        div.className = 'question-group';
        div.innerHTML = `
          <div class="question-number">P${q.no}</div>
          <div class="question-text">${q.text}</div>
          <div class="radio-group">
            ${OPTIONS.map(opt => `
              <div class="radio-option">
                <input type="radio" name="p${q.no}" value="${opt.value}">
                <label>${opt.label}</label>
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(div);
      });
    }

    function showNotification(msg, type = 'info') {
      const n = document.createElement('div');
      n.className = `notification ${type}`;
      n.textContent = msg;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }

    function resetForm() {
      document.getElementById('angketForm').reset();
    }

    function buildFormData() {
      const data = {
        noAbsen: document.getElementById('noAbsen').value.trim(),
        namaSiswa: document.getElementById('namaSiswa').value.trim(),
        kelas: document.getElementById('kelas').value.trim()
      };

      if (!data.noAbsen || !data.namaSiswa || !data.kelas) {
        showNotification('Lengkapi data diri terlebih dahulu', 'error');
        return null;
      }

      const unansweredQuestions = [];
      QUESTIONS.forEach(q => {
        const checked = document.querySelector(`input[name="p${q.no}"]:checked`);
        if (checked) {
          data[`p${q.no}`] = parseInt(checked.value);
        } else {
          unansweredQuestions.push(q.no);
        }
      });

      if (unansweredQuestions.length > 0) {
        const questionList = unansweredQuestions.join(', ');
        showNotification(`Pertanyaan belum terjawab: P${questionList}`, 'error');
        return null;
      }

      return data;
    }

    document.getElementById('angketForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = buildFormData();
      if (!data) return;

      document.getElementById('loadingIndicator').classList.add('show');

      try {
        console.log('Sending data to:', WEB_APP_URL);
        
        // Kirim tanpa header Content-Type untuk menghindari CORS preflight
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });

        console.log('Response status:', response.status);
        
        // Cek apakah response berhasil
        if (response.ok) {
          const result = await response.json();
          console.log('Result:', result);
          
          if (result.success) {
            showNotification('✓ Data berhasil disimpan ke Google Sheet!', 'success');
            resetForm();
          } else {
            showNotification('Error: ' + (result.error || 'Terjadi kesalahan'), 'error');
          }
        } else {
          showNotification('Error: Server mengembalikan status ' + response.status, 'error');
        }
      } catch (error) {
        console.error('Fetch error details:', error);
        showNotification('Gagal menghubungi server. Pastikan URL Web App sudah benar.', 'error');
      } finally {
        document.getElementById('loadingIndicator').classList.remove('show');
      }
    });

    async function loadData() {
      // Fungsi dihapus
    }

    initializeForm();
  </script>
